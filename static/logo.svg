    <!-- Ascending chart bars inside the lens -->
    <rect x="14" y="33" width="3.5" height="9"  rx="1" fill="url(#g)"/>
    <rect x="19.5" y="29" width="3.5" height="13" rx="1" fill="url(#g)"/>
    <rect x="25" y="24" width="3.5" height="18" rx="1" fill="url(#g)"/>
    <rect x="30.5" y="18" width="3.5" height="24" rx="1" fill="url(#g)"/>
</svg>
