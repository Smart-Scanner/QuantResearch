<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0A0E14">
  <title>Offline — QuantResearch</title>
  <style>
    :root {
      --canvas: #0A0E14;
      --surface: #111720;
      --border-hairline: #1E2630;
      --text-primary: #E7EBF2;
      --text-secondary: #9AA3B2;
      --accent: #4C8DFF;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--canvas);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border-hairline);
      border-radius: 8px;
      max-width: 420px;
      width: 100%;
      padding: 32px;
      text-align: center;
    }
    .mark {
      width: 48px;
      height: 48px;
      margin: 0 auto 20px;
      display: block;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-secondary);
      margin: 0;
    }
    .accent { color: var(--accent); }
  </style>
</head>
<body>
  <main class="card">
    <svg class="mark" viewBox="0 0 512 512" aria-hidden="true">
      <path d="M256 116 L368 180 L368 332 L256 396 L144 332 L144 180 Z"
            fill="none" stroke="#4C8DFF" stroke-width="28"
            stroke-linejoin="round" stroke-linecap="round"/>
    </svg>
    <h1>You are offline</h1>
    <p><span class="accent">QuantResearch</span> will reconnect automatically once your connection is restored.</p>
  </main>
</body>
</html>
